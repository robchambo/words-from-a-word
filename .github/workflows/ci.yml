name: CI

on:
  pull_request:
    branches: [v2, main]
  push:
    branches: [v2, main]

jobs:
  test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test --no-pub

# NOTE: Phase 7 will extend this workflow with a `validate_levels` step that
# runs `dart run tool/validate_levels.dart` before `flutter analyze`.
# Phase 9 will add a build-android job that uploads a debug APK artifact on
# pushes to v2. Do not delete this file when those phases land — amend it.
