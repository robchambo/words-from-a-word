name: slova_iz_slova
description: Russian/English word game for the US diaspora
publish_to: 'none'
version: 1.1.0-beta.5+5

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Audio
  audioplayers: ^6.0.0

  # Animations
  flutter_animate: ^4.5.0

  # Fonts (loaded via Google Fonts)
  google_fonts: ^6.2.1

  # Shared preferences (persist language choice, score, level)
  shared_preferences: ^2.3.2

  # Monetisation (Phase 5)
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0
  app_tracking_transparency: ^2.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1
  flutter_lints: ^6.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true

  assets:
    - assets/data/russian_levels.json
    - assets/data/english_levels.json
    - assets/audio/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  # Adaptive icon: foreground is the source image, background is cream
  # matching the Soviet-notebook page colour (AppTheme.background).
  adaptive_icon_background: "#FFFEF0"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  min_sdk_android: 21
