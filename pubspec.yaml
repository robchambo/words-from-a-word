name: slova_iz_slova
description: Russian/English word game for the US diaspora
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Animations
  flutter_animate: ^4.5.0

  # Fonts (loaded via Google Fonts)
  google_fonts: ^6.2.1

  # Shared preferences (persist language choice, score, level)
  shared_preferences: ^2.3.2

  # Ads (uncomment after core game is working)
  # google_mobile_ads: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/russian_levels.json
    - assets/data/english_levels.json
